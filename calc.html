<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#000000"/>
  <meta property="og:title" content="Changbaka"/>
  <meta property="og:description" content="43/3321 phường đang được phủ"/>
  <title>Changbaka</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      background:#000!important;color:#fff;
      font-family:'Barlow',sans-serif;
      min-height:100vh;
      -webkit-text-size-adjust:100%;
      overflow-x:hidden;
    }

    /* ══ INTRO ══ */
    #introOverlay{
      position:fixed;inset:0;z-index:200;background:#000;
      display:flex;align-items:center;justify-content:center;
    }
    #introCanvas{position:absolute;inset:0;width:100%;height:100%;}
    #introLogo{
      position:relative;z-index:2;
      font-family:'Barlow',sans-serif;
      font-size:clamp(48px,13vw,88px);
      font-weight:800;letter-spacing:-0.02em;
      background:linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00dd44,#0088ff,#7700cc,#cc00aa,#ff0000);
      background-size:250% 100%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:lr 2s linear infinite;pointer-events:none;
      text-shadow:none;
    }
    @keyframes lr{0%{background-position:0% 50%}100%{background-position:250% 50%}}

    /* ══ PAGE ══ */
    .page{
      background:#000;
      max-width:560px;width:100%;
      margin:0 auto;
      opacity:0;transition:opacity 0.7s ease;
    }
    .page.show{opacity:1;}

    /* ══ EARTH ══ */
    .hero{
      width:100%;
      display:flex;align-items:center;justify-content:center;
      padding:48px 0 24px;
      position:relative;overflow:hidden;
    }
    .hero::before{
      content:'';position:absolute;inset:0;
      background-image:
        radial-gradient(1px 1px at 8% 18%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 72% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 78%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 88%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 92%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 93% 38%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 32%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 10%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events:none;z-index:0;
    }
    .hero::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:28%;
      background:linear-gradient(to bottom,transparent,#000);
      pointer-events:none;z-index:2;
    }
    .earth-wrap{
      position:relative;
      width:clamp(200px,65vw,340px);
      height:clamp(200px,65vw,340px);
      z-index:1;
    }
    .earth-glow{
      position:absolute;inset:-20%;border-radius:50%;
      background:radial-gradient(circle, rgba(30,120,255,0.22) 0%, rgba(0,200,255,0.1) 45%, transparent 70%);
      animation:glowPulse 5s ease-in-out infinite;
    }
    @keyframes glowPulse{
      0%,100%{transform:scale(1);opacity:0.6;}
      50%{transform:scale(1.1);opacity:1;}
    }
    .orbit{
      position:absolute;inset:-10%;border-radius:50%;
      border:1px solid rgba(255,255,255,0.07);
      animation:orbitSpin 28s linear infinite;
    }
    .orbit::after{
      content:'';position:absolute;top:-3px;left:50%;
      transform:translateX(-50%);
      width:5px;height:5px;background:#cef;border-radius:50%;
      box-shadow:0 0 6px #aef,0 0 14px rgba(100,220,255,0.9);
    }
    @keyframes orbitSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .earth-img{
      width:100%;height:100%;border-radius:50%;object-fit:cover;
      animation:spinEarth 40s linear infinite;
      position:relative;z-index:1;
      box-shadow:0 0 50px rgba(30,120,255,0.35),0 0 100px rgba(0,180,255,0.12),inset -20px 0 50px rgba(0,0,0,0.5);
    }
    @keyframes spinEarth{
      0%  {transform:rotate(0deg);}
      100%{transform:rotate(360deg);}
    }

    /* ══ CONTENT ══ */
    .content{padding:clamp(16px,4vw,28px) clamp(22px,6vw,36px) clamp(48px,10vw,80px);}

    .headline{
      font-size:clamp(64px,20vw,110px);
      font-weight:800;line-height:0.9;letter-spacing:-0.02em;
      margin-bottom:clamp(16px,3.5vw,24px);
      background:linear-gradient(90deg,
        #ff0000,#ff7700,#ffee00,#00cc44,#0088ff,#6600cc,#cc00aa,
        #ff0000,#ff7700,#ffee00,#00cc44,#0088ff,#6600cc,#cc00aa,#ff0000
      );
      background-size:300% 100%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:rf 3s linear infinite;
    }
    @keyframes rf{0%{background-position:0% 50%}100%{background-position:100% 50%}}

    .desc{
      font-size:clamp(13px,3.5vw,16px);font-weight:300;line-height:1.8;
      color:rgba(255,255,255,0.65);margin-bottom:8px;
    }
    .desc strong{color:#fff;font-weight:600;}

    .updated{
      font-size:clamp(10px,2.2vw,11px);letter-spacing:0.14em;text-transform:uppercase;
      color:rgba(255,255,255,0.25);margin-bottom:clamp(28px,6vw,40px);
      margin-top:4px;
    }
    .updated span{color:rgba(255,255,255,0.48);}

    /* Button group */
    .btn-group{display:flex;flex-direction:column;gap:12px;}

    .btn{
      display:flex;align-items:center;justify-content:space-between;width:100%;
      padding:clamp(15px,4vw,20px) clamp(18px,5vw,26px);
      border:1px solid rgba(255,255,255,0.22);
      background:transparent;color:rgba(255,255,255,0.78);
      font-family:'Barlow',sans-serif;
      font-size:clamp(10px,2.6vw,12px);font-weight:600;
      letter-spacing:0.2em;text-transform:uppercase;
      cursor:pointer;transition:all 0.3s;
      position:relative;overflow:hidden;
      text-decoration:none;-webkit-tap-highlight-color:transparent;
    }
    .btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,
        rgba(255,0,0,.12),rgba(255,119,0,.12),rgba(255,238,0,.12),
        rgba(0,204,68,.12),rgba(0,136,255,.12),rgba(102,0,204,.12),rgba(204,0,170,.12)
      );
      background-size:300% 100%;opacity:0;transition:opacity 0.3s;
      animation:rb 3s linear infinite;
    }
    @keyframes rb{0%{background-position:0% 50%}100%{background-position:300% 50%}}
    .btn:hover,.btn:focus{border-color:rgba(255,255,255,0.5);color:#fff;outline:none;}
    .btn:hover::before{opacity:1;}
    .btn:active{transform:scale(0.985);}

    .btn-icon{font-size:16px;flex-shrink:0;margin-left:10px;transition:transform 0.3s;}
    .btn:hover .btn-icon{transform:translateX(5px);}
    .btn.maps .btn-icon{transform:none;}
    .btn.maps:hover .btn-icon{transform:scale(1.15);}
    /* ══ PROGRESS BAR ══ */
    .progress-section {
      padding: clamp(16px,4vw,28px) clamp(22px,6vw,36px) clamp(40px,8vw,64px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .progress-label {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 10px;
    }
    .progress-title {
      font-size: clamp(10px,2.4vw,12px); font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .progress-count {
      font-size: clamp(11px,2.6vw,13px); font-weight: 600;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00cc44,#0088ff,#6600cc,#cc00aa,#ff0000);
      background-size: 300% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: rf 3s linear infinite;
    }
    .progress-track {
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill-bar {
      height: 100%;
      background: linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00cc44,#0088ff,#6600cc,#cc00aa);
      background-size: 300% 100%;
      border-radius: 3px;
      animation: rf 3s linear infinite;
      transition: width 1.2s cubic-bezier(.22,.61,.36,1);
    }
    .progress-sub {
      font-size: clamp(9px,2vw,10px); letter-spacing: 0.12em;
      color: rgba(255,255,255,0.2); text-transform: uppercase;
      text-align: right;
    }

<script>
// Set progress bar width
(function() {
  var pct = (43 / 3321 * 100).toFixed(2);
  var bar = document.getElementById('progressBar');
  if (bar) {
    setTimeout(function() { bar.style.width = pct + '%'; }, 300);
  }
})();
// ── INTRO ──
var canvas=document.getElementById('introCanvas');
var ctx=canvas.getContext('2d');
var W,H,cx,cy;
var COLORS=['#ff0000','#ff7700','#ffee00','#00dd44','#0088ff','#7700cc','#cc00aa'];
var birds=[];
var startTime=performance.now();
var DURATION=2600;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;}
window.addEventListener('resize',resize);resize();

function drawBird(x,y,sz,angle,color,alpha){
  ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,alpha));
  ctx.translate(x,y);ctx.rotate(angle);ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(0,0,sz*0.5,sz*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-sz*0.04);ctx.bezierCurveTo(-sz*0.3,-sz*0.55,-sz*0.85,-sz*0.3,-sz*0.65,sz*0.08);ctx.bezierCurveTo(-sz*0.4,sz*0.28,0,sz*0.04,0,-sz*0.04);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-sz*0.04);ctx.bezierCurveTo(sz*0.3,-sz*0.55,sz*0.85,-sz*0.3,sz*0.65,sz*0.08);ctx.bezierCurveTo(sz*0.4,sz*0.28,0,sz*0.04,0,-sz*0.04);ctx.fill();
  ctx.beginPath();ctx.moveTo(-sz*0.42,sz*0.04);ctx.lineTo(-sz*0.72,-sz*0.22);ctx.lineTo(-sz*0.52,sz*0.06);ctx.lineTo(-sz*0.72,sz*0.28);ctx.closePath();ctx.fill();
  ctx.restore();
}

(function spawnBirds(){
  for(var i=0;i<90;i++){
    var ring=Math.floor(i/COLORS.length);
    birds.push({
      ci:i%COLORS.length,
      r:Math.min(W,H)*(0.18+ring*0.1)+Math.random()*Math.min(W,H)*0.06,
      phase:Math.random()*Math.PI*2,
      speed:(0.8+Math.random()*1.0)*(ring%2===0?1:-1),
      sz:7+Math.random()*11,
      wave:12+Math.random()*20,
      wf:1.5+Math.random()*3,
      wp:Math.random()*Math.PI*2,
      birth:Math.random()*0.3
    });
  }
})();

function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function frame(){
  var elapsed=performance.now()-startTime;
  var prog=Math.min(elapsed/DURATION,1);
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  var t=elapsed/1000;
  var pull=prog>0.72?1-ease((prog-0.72)/0.28):1;
  for(var i=0;i<birds.length;i++){
    var b=birds[i];
    if(prog<b.birth)continue;
    var r=b.r*pull,ang=b.phase+b.speed*t;
    var perp=b.wave*Math.sin(b.wf*t+b.wp)*pull;
    var px=cx+Math.cos(ang)*r+Math.cos(ang+Math.PI/2)*perp;
    var py=cy+Math.sin(ang)*r+Math.sin(ang+Math.PI/2)*perp;
    var nx=cx+Math.cos(ang+0.05)*r+Math.cos(ang+Math.PI/2+0.05)*perp;
    var ny=cy+Math.sin(ang+0.05)*r+Math.sin(ang+Math.PI/2+0.05)*perp;
    var life=(prog-b.birth)/(1-b.birth);
    var alpha=Math.min(life*6,1)*(prog>0.78?1-(prog-0.78)/0.22:1);
    drawBird(px,py,b.sz*pull,Math.atan2(ny-py,nx-px),COLORS[b.ci],alpha);
  }
  var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.12);
  grd.addColorStop(0,'rgba(255,255,255,0.08)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  if(prog<1){requestAnimationFrame(frame);}
  else{
    var ov=document.getElementById('introOverlay');
    ov.style.transition='opacity 0.55s ease';ov.style.opacity='0';
    setTimeout(function(){ov.remove();document.getElementById('mainPage').classList.add('show');},570);
  }
}
frame();

// ── DATE ──
var now=new Date(),days=['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];
document.getElementById('date').textContent=days[now.getDay()]+', '+String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+now.getFullYear();
