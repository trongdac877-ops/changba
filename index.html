<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Changbaka</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#000!important;color:#fff;font-family:'Barlow',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%;}

    /* ══ INTRO ══ */
    #introOverlay{
      position:fixed;inset:0;z-index:200;background:#000;
      display:flex;align-items:center;justify-content:center;
    }
    #introCanvas{position:absolute;inset:0;width:100%;height:100%;}
    #introLogo{
      position:relative;z-index:2;
      font-family:'Barlow',sans-serif;
      font-size:clamp(52px,14vw,90px);
      font-weight:800;letter-spacing:-0.01em;
      background:linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00dd44,#0088ff,#7700cc,#cc00aa,#ff0000);
      background-size:250% 100%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:lr 2s linear infinite;
      pointer-events:none;
    }
    @keyframes lr{0%{background-position:0% 50%}100%{background-position:250% 50%}}

    /* ══ PAGE ══ */
    .page{background:#000;max-width:600px;width:100%;margin:0 auto;opacity:0;transition:opacity 0.7s ease;}
    .page.show{opacity:1;}
    .hero{width:100%;position:relative;overflow:hidden;}
    .hero img{width:100%;display:block;height:auto;}
    .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(to bottom,transparent,#000);}
    .content{padding:clamp(20px,5vw,36px) clamp(20px,6vw,32px) clamp(40px,8vw,72px);}
    .headline{
      font-size:clamp(52px,18vw,100px);font-weight:800;line-height:0.92;letter-spacing:-0.01em;
      margin-bottom:clamp(14px,3vw,22px);
      background:linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00cc44,#0088ff,#6600cc,#cc00aa,#ff0000,#ff7700,#ffee00,#00cc44,#0088ff,#6600cc,#cc00aa,#ff0000);
      background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:rf 3s linear infinite;
    }
    @keyframes rf{0%{background-position:0% 50%}100%{background-position:100% 50%}}
    .desc{font-size:clamp(13px,3.5vw,16px);font-weight:300;line-height:1.75;color:rgba(255,255,255,0.68);margin-bottom:10px;}
    .desc strong{color:#fff;font-weight:600;}
    .updated{font-size:clamp(10px,2.5vw,12px);letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:clamp(24px,5vw,36px);}
    .updated span{color:rgba(255,255,255,0.52);}
    .btn{
      display:flex;align-items:center;justify-content:space-between;width:100%;
      padding:clamp(16px,4vw,22px) clamp(18px,5vw,28px);
      border:1px solid rgba(255,255,255,0.28);background:transparent;color:rgba(255,255,255,0.82);
      font-family:'Barlow',sans-serif;font-size:clamp(10px,2.8vw,12px);font-weight:600;
      letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;
      position:relative;overflow:hidden;text-decoration:none;-webkit-tap-highlight-color:transparent;
    }
    .btn::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,rgba(255,0,0,.13),rgba(255,119,0,.13),rgba(255,238,0,.13),rgba(0,204,68,.13),rgba(0,136,255,.13),rgba(102,0,204,.13),rgba(204,0,170,.13));
      background-size:300% 100%;opacity:0;transition:opacity 0.3s;animation:rb 3s linear infinite;
    }
    @keyframes rb{0%{background-position:0% 50%}100%{background-position:300% 50%}}
    .btn:hover,.btn:focus{border-color:rgba(255,255,255,0.55);color:#fff;outline:none;}
    .btn:hover::before{opacity:1;}
    .btn:active{transform:scale(0.98);}
    .arrow{font-size:18px;transition:transform 0.3s;flex-shrink:0;margin-left:12px;}
    .btn:hover .arrow{transform:translateX(6px);}
  </style>
</head>

var W,H,cx,cy;
var COLORS=['#ff0000','#ff7700','#ffee00','#00dd44','#0088ff','#7700cc','#cc00aa'];
var birds=[];
var startTime=performance.now();
var DURATION=2600;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  cx=W/2; cy=H/2;
}
window.addEventListener('resize',resize); resize();

// Draw a bird/swallow shape
function drawBird(x,y,sz,angle,color,alpha){
  ctx.save();
  ctx.globalAlpha=Math.max(0,Math.min(1,alpha));
  ctx.translate(x,y);
  ctx.rotate(angle);
  ctx.fillStyle=color;
  // body
  ctx.beginPath();
  ctx.ellipse(0,0,sz*0.5,sz*0.18,0,0,Math.PI*2);
  ctx.fill();
  // left wing
  ctx.beginPath();
  ctx.moveTo(0,-sz*0.04);
  ctx.bezierCurveTo(-sz*0.3,-sz*0.55,-sz*0.85,-sz*0.3,-sz*0.65,sz*0.08);
  ctx.bezierCurveTo(-sz*0.4,sz*0.28,0,sz*0.04,0,-sz*0.04);
  ctx.fill();
  // right wing
  ctx.beginPath();
  ctx.moveTo(0,-sz*0.04);
  ctx.bezierCurveTo(sz*0.3,-sz*0.55,sz*0.85,-sz*0.3,sz*0.65,sz*0.08);
  ctx.bezierCurveTo(sz*0.4,sz*0.28,0,sz*0.04,0,-sz*0.04);
  ctx.fill();
  // tail fork
  ctx.beginPath();
  ctx.moveTo(-sz*0.42,sz*0.04);
  ctx.lineTo(-sz*0.72,-sz*0.22);
  ctx.lineTo(-sz*0.52,sz*0.06);
  ctx.lineTo(-sz*0.72,sz*0.28);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// Create birds in layers around center
function spawnBirds(){
  birds=[];
  var total=90;
  for(var i=0;i<total;i++){
    var ci=i%COLORS.length;
    // multiple rings
    var ring=Math.floor(i/COLORS.length);
    var baseR=Math.min(W,H)*(0.18+ring*0.1);
    var r=baseR+Math.random()*Math.min(W,H)*0.06;
    var dir=(ring%2===0)?1:-1;
    birds.push({
      ci:ci,
      r:r,
      phase:Math.random()*Math.PI*2,
      speed:(0.8+Math.random()*1.0)*dir,
      sz:7+Math.random()*11,
      wave:12+Math.random()*20,
      wf:1.5+Math.random()*3,
      wp:Math.random()*Math.PI*2,
      birth:Math.random()*0.3
    });
  }
}
spawnBirds();

function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function frame(){
  var elapsed=performance.now()-startTime;
  var prog=Math.min(elapsed/DURATION,1);

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  var t=elapsed/1000;

  // spiral pull-in factor near end
  var pull=prog>0.72?1-ease((prog-0.72)/0.28):1;

  for(var i=0;i<birds.length;i++){
    var b=birds[i];
    if(prog<b.birth) continue;
    var life=(prog-b.birth)/(1-b.birth);

    var r=b.r*pull;
    var ang=b.phase+b.speed*t;
    // sinusoidal ripple perpendicular
    var perp=b.wave*Math.sin(b.wf*t+b.wp)*pull;
    var px=cx+Math.cos(ang)*r+Math.cos(ang+Math.PI/2)*perp;
    var py=cy+Math.sin(ang)*r+Math.sin(ang+Math.PI/2)*perp;

    // heading direction
    var nx=cx+Math.cos(ang+0.05)*r+Math.cos(ang+Math.PI/2+0.05)*perp;
    var ny=cy+Math.sin(ang+0.05)*r+Math.sin(ang+Math.PI/2+0.05)*perp;
    var heading=Math.atan2(ny-py,nx-px);

    var alpha=Math.min(life*6,1)*(prog>0.78?1-(prog-0.78)/0.22:1);
    drawBird(px,py,b.sz*pull,heading,COLORS[b.ci],alpha);
  }

  // center glow pulse
  var glowR=Math.min(W,H)*0.12*(1+0.15*Math.sin(t*4));
  var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,glowR);
  var ci2=Math.floor(t*2)%COLORS.length;
  grd.addColorStop(0,'rgba(255,255,255,0.10)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  if(prog<1){
    requestAnimationFrame(frame);
  } else {
    // fade out overlay → show page
    var ov=document.getElementById('introOverlay');
    ov.style.transition='opacity 0.55s ease';
    ov.style.opacity='0';
    setTimeout(function(){
      ov.remove();
      document.getElementById('mainPage').classList.add('show');
    },570);
  }
}
frame();
</script>
</body>
</html>
