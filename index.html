<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành trình Việt Nam của Calc</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.5s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }

  .btc-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.1s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btc-circle {
    width: 52px; height: 52px;
    background: #F7931A;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .btc-circle svg { width: 30px; height: 30px; }

  .btc-ticker {
    font-size: 13px; letter-spacing: 2px; font-weight: 400;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  .btc-price-big {
    font-size: 34px; font-weight: 300;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.9);
    min-height: 44px;
    transition: color 0.25s;
  }
  .btc-price-big.up   { color: #30d158; }
  .btc-price-big.down { color: #ff453a; }

  .btc-change {
    font-size: 13px; font-weight: 400;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.3);
    min-height: 18px;
    transition: color 0.25s;
  }
  .btc-change.up   { color: #30d158; }
  .btc-change.down { color: #ff453a; }

  .divider {
    width: 1px; height: 32px;
    background: rgba(255,255,255,0.1);
    margin: 8px 0;
  }

  .progress-bar {
    width: 160px; height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px; overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.6);
    border-radius: 1px;
    transition: width 0.05s linear;
  }

  /* ── MAIN PAGE ── */
  #page {
    opacity: 0; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 72px 32px 72px;
    transition: opacity 0.7s ease;
    overflow-y: auto;
  }
  #page.show { opacity: 1; }

  .ring-container {
    width: 280px; height: 280px; margin-bottom: 64px; flex-shrink: 0;
    opacity: 0; transform: scale(0.94);
    transition: opacity 0.9s ease 0.1s, transform 0.9s ease 0.1s;
  }
  #page.show .ring-container { opacity: 1; transform: scale(1); }
  .ring-container svg { width: 100%; height: 100%; }

  .info { text-align: center; width: 100%; max-width: 320px; }

  .tagline {
    font-size: 20px; font-weight: 400;
    color: rgba(255,255,255,0.92);
    line-height: 1.55; margin-bottom: 30px;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.6s ease 0.35s, transform 0.6s ease 0.35s;
  }
  #page.show .tagline { opacity: 1; transform: translateY(0); }

  .date-line {
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,0.88); margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.6s ease 0.48s, transform 0.6s ease 0.48s;
  }
  #page.show .date-line { opacity: 1; transform: translateY(0); }

  .time-line {
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,0.88);
    font-variant-numeric: tabular-nums; margin-bottom: 44px;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.6s ease 0.58s, transform 0.6s ease 0.58s;
  }
  #page.show .time-line { opacity: 1; transform: translateY(0); }

  .btn {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 50px; padding: 14px 56px;
    font-size: 15px; font-weight: 400; letter-spacing: 2.5px;
    color: #fff; background: transparent; cursor: pointer; font-family: inherit;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.6s ease 0.68s, transform 0.6s ease 0.68s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #page.show .btn { opacity: 1; transform: translateY(0); }
  .btn:hover  { background: rgba(255,255,255,0.08); }
  .btn:active { background: rgba(255,255,255,0.14); }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="btc-wrap">
    <div class="btc-circle">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M37.8 24.2c.5-3.4-2.1-5.2-5.6-6.4l1.1-4.6-2.8-.7-1.1 4.4c-.7-.2-1.5-.4-2.2-.5l1.1-4.5-2.8-.7-1.1 4.6c-.6-.1-1.2-.3-1.8-.4l-3.8-.9-.7 3s2.1.5 2 .5c1.1.3 1.3 1 1.3 1.6L20 25.2c.1 0 .2.1.3.1h-.3l-1.8 7.3c-.1.3-.5.8-1.3.6.03.04-2.03-.5-2.03-.5l-1.37 3.2 3.6.9c.67.17 1.33.34 1.97.51l-1.13 4.6 2.77.7 1.13-4.63c.77.2 1.5.4 2.23.57l-1.1 4.6 2.8.7 1.13-4.6c4.67.87 8.17.53 9.63-3.7 1.2-3.4-.06-5.36-2.5-6.64 1.77-.4 3.1-1.57 3.47-3.97zM33 31.9c-.83 3.4-6.53 1.57-8.37 1.1l1.5-5.97c1.83.47 7.73 1.37 6.87 4.87zm.87-7.77c-.77 3.07-5.5 1.5-7.03 1.13l1.36-5.4c1.53.37 6.47 1.07 5.67 4.27z" fill="white"/>
      </svg>
    </div>
    <div class="btc-ticker">BTC / USDT</div>
    <div class="btc-price-big" id="loaderPrice">—</div>
    <div class="btc-change" id="loaderChange">&nbsp;</div>
    <div class="divider"></div>
    <div class="progress-bar">
      <div class="progress-fill" id="fill"></div>
    </div>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="page">
  <div class="ring-container">
    <svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="centerBg" cx="50%" cy="50%"  r="50%">
          <stop offset="0%"   stop-color="#0e0e28"/>
          <stop offset="60%"  stop-color="#080820"/>
          <stop offset="100%" stop-color="#030310"/>
        </radialGradient>
        <radialGradient id="gold" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="transparent"/>
          <stop offset="63%"  stop-color="transparent"/>
          <stop offset="70%"  stop-color="rgba(200,140,20,0.12)"/>
          <stop offset="76%"  stop-color="rgba(255,200,60,0.55)"/>
          <stop offset="80%"  stop-color="rgba(255,220,90,0.90)"/>
          <stop offset="83%"  stop-color="rgba(255,205,70,0.70)"/>
          <stop offset="88%"  stop-color="rgba(210,155,30,0.30)"/>
          <stop offset="95%"  stop-color="rgba(160,110,10,0.08)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="violet" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="transparent"/>
          <stop offset="60%"  stop-color="transparent"/>
          <stop offset="66%"  stop-color="rgba(180,120,220,0.08)"/>
          <stop offset="71%"  stop-color="rgba(200,150,235,0.40)"/>
          <stop offset="74%"  stop-color="rgba(210,165,242,0.60)"/>
          <stop offset="77%"  stop-color="rgba(195,145,230,0.38)"/>
          <stop offset="83%"  stop-color="rgba(160,110,200,0.08)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="blue" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="transparent"/>
          <stop offset="55%"  stop-color="transparent"/>
          <stop offset="61%"  stop-color="rgba(170,195,255,0.10)"/>
          <stop offset="65%"  stop-color="rgba(195,215,255,0.50)"/>
          <stop offset="68%"  stop-color="rgba(215,230,255,0.82)"/>
          <stop offset="71%"  stop-color="rgba(195,215,255,0.50)"/>
          <stop offset="76%"  stop-color="rgba(155,180,245,0.15)"/>
          <stop offset="84%"  stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="halo" cx="50%" cy="50%" r="50%">
          <stop offset="60%"  stop-color="transparent"/>
          <stop offset="75%"  stop-color="rgba(255,230,150,0.04)"/>
          <stop offset="86%"  stop-color="rgba(200,180,255,0.07)"/>
          <stop offset="96%"  stop-color="rgba(160,190,255,0.04)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <filter id="f6"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="f10"><feGaussianBlur stdDeviation="10"/></filter>
        <filter id="f3"><feGaussianBlur stdDeviation="3"/></filter>
        <filter id="f1"><feGaussianBlur stdDeviation="1.5"/></filter>
      </defs>
      <circle cx="140" cy="140" r="140" fill="#000"/>
      <circle cx="140" cy="140" r="140" fill="url(#halo)"   filter="url(#f10)"/>
      <circle cx="140" cy="140" r="140" fill="url(#gold)"   filter="url(#f6)"/>
      <circle cx="140" cy="140" r="140" fill="url(#gold)"   filter="url(#f1)" opacity="0.55"/>
      <circle cx="140" cy="140" r="140" fill="url(#violet)" filter="url(#f3)"/>
      <circle cx="140" cy="140" r="140" fill="url(#blue)"   filter="url(#f3)"/>
      <circle cx="140" cy="140" r="140" fill="url(#blue)"   filter="url(#f1)" opacity="0.6"/>
      <circle cx="140" cy="140" r="84"  fill="url(#centerBg)"/>
      <text x="140" y="147"
        text-anchor="middle" dominant-baseline="middle"
        font-family="-apple-system,'Helvetica Neue',sans-serif"
        font-size="30" font-weight="300" letter-spacing="1"
        fill="rgba(255,255,255,0.88)">30/3321</text>
    </svg>
  </div>
  <div class="info">
    <p class="tagline">Hành trình khám phá<br>toàn bộ Việt Nam của Calc</p>
    <p class="date-line" id="d"></p>
    <p class="time-line" id="t"></p>
    <button class="btn">CALC</button>
  </div>
</div>

<script>
  // ── clock ──
  function tick() {
    const now = new Date(), tz = 'Asia/Ho_Chi_Minh';
    document.getElementById('d').textContent = now.toLocaleDateString('vi-VN',
      { year:'numeric', month:'long', day:'numeric', timeZone: tz });
    document.getElementById('t').textContent = now.toLocaleTimeString('vi-VN',
      { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone: tz });
  }
  tick(); setInterval(tick, 1000);

  // ── BTC price ──
  let lastPrice = null;
  let openPrice = null;
  const priceEl  = document.getElementById('loaderPrice');
  const changeEl = document.getElementById('loaderChange');

  async function fetchBTC() {
    try {
      const [tickerRes, statsRes] = await Promise.all([
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'),
        fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT')
      ]);
      const ticker = await tickerRes.json();
      const stats  = await statsRes.json();
      const price  = parseFloat(ticker.price);
      const chgPct = parseFloat(stats.priceChangePercent);
      const chgAbs = parseFloat(stats.priceChange);

      const fmt = price.toLocaleString('en-US', { style:'currency', currency:'USD', minimumFractionDigits:2, maximumFractionDigits:2 });
      const sign = chgPct >= 0 ? '+' : '';
      const dir  = chgPct >= 0 ? 'up' : 'down';

      priceEl.textContent  = fmt;
      priceEl.className    = 'btc-price-big ' + dir;

      changeEl.textContent = sign + chgPct.toFixed(2) + '%  (' + sign + chgAbs.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}) + ')';
      changeEl.className   = 'btc-change ' + dir;

      lastPrice = price;
    } catch(e) {
      priceEl.textContent  = '—';
      changeEl.textContent = '';
    }
  }
  fetchBTC();
  setInterval(fetchBTC, 3000);

  // ── loader — fast progress ──
  const fill   = document.getElementById('fill');
  const loader = document.getElementById('loader');
  const page   = document.getElementById('page');

  let pct = 0;
  // total ~1100ms
  const steps = [
    {target:30, delay:30},
    {target:55, delay:25},
    {target:72, delay:35},
    {target:88, delay:25},
    {target:100,delay:20},
  ];
  let si = 0;
  function runStep() {
    if (si >= steps.length) return;
    const s = steps[si++];
    const iv = setInterval(() => {
      pct = Math.min(pct + 1, s.target);
      fill.style.width = pct + '%';
      if (pct >= s.target) { clearInterval(iv); setTimeout(runStep, s.delay); }
    }, 10);
  }

  setTimeout(() => {
    runStep();
    setTimeout(() => {
      loader.classList.add('hide');
      document.body.style.overflow = 'auto';
      page.classList.add('show');
      setTimeout(() => loader.remove(), 600);
    }, 1300);
  }, 200);
</script>
</body>
</html>
